services:
  gpu-agent:
    build:
      context: ./agent
    container_name: gpu-monitor-agent
    restart: unless-stopped
    environment:
      - BACKEND_URL=${BACKEND_URL:?Set BACKEND_URL to the backend address e.g. http://192.168.1.x:3090}
      - INTERVAL=${INTERVAL:-5}
    deploy:
      resources:
        limits:
          memory: 32M
